<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Wishlist | PIO E-market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f8f7fc; padding-bottom: 70px; }
        .gradient-bg-card { background: linear-gradient(135deg, #4f6bff 0%, #7c8eff 100%); }
        .wishlist-item { transition: all 0.2s ease; }
        .wishlist-item:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .loader {
            border: 3px solid #e8e7f0;
            border-top: 3px solid #4f6bff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a2b3a;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 200;
            animation: fadeOut 3s ease forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .wishlist-img-container {
            width: 100%;
            height: 180px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f4fa 0%, #e8e7f0 100%);
        }
        .wishlist-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px);
            border-top: 1px solid #eeeef5; padding: 10px 20px 20px; z-index: 100;
        }
        @media (min-width: 1024px) { body { padding-bottom: 0; } .bottom-nav { display: none; } }
    </style>
</head>
<body class="bg-[#f8f7fc] antialiased">

    <div id="loadingOverlay" class="fixed inset-0 bg-white/95 z-50 flex items-center justify-center">
        <div class="text-center">
            <div class="loader mx-auto mb-4"></div>
            <p class="text-[#4f6bff] font-medium">Loading your wishlist...</p>
        </div>
    </div>

    <header class="sticky top-0 z-30 bg-white/95 backdrop-blur-xl border-b border-[#eeeef5] shadow-sm">
        <div class="px-4 sm:px-6 lg:px-8 py-3 flex items-center justify-between">
            <a href="/dashboard" class="flex items-center gap-3 cursor-pointer">
                <div class="w-9 h-9 rounded-xl gradient-bg-card flex items-center justify-center shadow-sm">
                    <span class="text-white font-extrabold text-lg">P</span>
                </div>
                <div class="leading-tight">
                    <h1 class="text-xl font-extrabold tracking-tight text-[#4f6bff]">PIO E-market</h1>
                    <p class="text-[10px] font-medium text-[#a5a3b5] tracking-wide">curated atelier</p>
                </div>
            </a>
            <div class="flex items-center gap-4">
                <a href="/dashboard" class="text-sm text-[#6b6a7e] hover:text-[#4f6bff] transition flex items-center gap-1">
                    <span class="material-symbols-outlined text-lg">arrow_back</span>
                    <span class="hidden sm:inline">Continue Shopping</span>
                </a>
                <a href="/cart" class="relative p-2 rounded-full hover:bg-[#f0eef8] transition">
                    <span class="material-symbols-outlined text-[#8a88a0]">shopping_cart</span>
                    <span class="absolute -top-1 -right-1 bg-[#ff6b6b] text-white text-[10px] rounded-full px-1.5 py-0.5 min-w-[18px] text-center" id="cartBadge">0</span>
                </a>
                <div class="flex items-center gap-2 cursor-pointer hover:bg-[#f0eef8] rounded-full pl-2 pr-3 py-1 transition" id="userMenuBtn">
                    <div class="w-8 h-8 rounded-full gradient-bg-card flex items-center justify-center text-white font-semibold text-sm shadow-sm" id="userInitial">JD</div>
                    <span class="text-sm font-medium text-[#2a2b3a] hidden sm:inline-block" id="userName">Loading...</span>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold text-[#2a2b3a]">❤️ My Wishlist</h1>
            <p class="text-[#a5a3b5] mt-1">Your favorite items saved for later</p>
        </div>

        <div id="wishlistContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Items will be loaded here -->
        </div>
    </div>

    <!-- MOBILE BOTTOM NAVIGATION -->
    <nav class="bottom-nav lg:hidden">
        <div class="flex justify-around items-center">
            <a href="/dashboard" class="nav-item flex flex-col items-center gap-1 text-[#a5a3b5]">
                <span class="material-symbols-outlined text-2xl">home</span>
                <span class="text-[10px]">Home</span>
            </a>
            <a href="/orders" class="nav-item flex flex-col items-center gap-1 text-[#a5a3b5]">
                <span class="material-symbols-outlined text-2xl">shopping_bag</span>
                <span class="text-[10px]">Orders</span>
            </a>
            <a href="/cart" class="nav-item flex flex-col items-center gap-1 text-[#a5a3b5] relative">
                <span class="material-symbols-outlined text-2xl">shopping_cart</span>
                <span class="text-[10px]">Cart</span>
                <span class="absolute -top-1 right-1/4 bg-[#ff6b6b] text-white text-[8px] rounded-full px-1.5 py-0.5" id="cartBadgeMobile">0</span>
            </a>
            <a href="/wishlist" class="nav-item flex flex-col items-center gap-1 text-[#4f6bff]">
                <span class="material-symbols-outlined text-2xl">favorite</span>
                <span class="text-[10px]">Wishlist</span>
            </a>
            <a href="/profile" class="nav-item flex flex-col items-center gap-1 text-[#a5a3b5]">
                <span class="material-symbols-outlined text-2xl">person</span>
                <span class="text-[10px]">Profile</span>
            </a>
        </div>
    </nav>

    <script>
        let currentUser = null;
        let wishlistItems = [];

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function checkLoginStatus() {
            try {
                const response = await fetch('/api/me');
                const result = await response.json();
                if (result.success) {
                    currentUser = result.user;
                    displayUserInfo(currentUser);
                    await loadCartCount();
                    await loadWishlist();
                } else {
                    window.location.href = '/login';
                }
            } catch (error) {
                console.error('Login check error:', error);
                window.location.href = '/login';
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        function displayUserInfo(user) {
            const initials = user.full_name.split(' ').map(n => n[0]).join('').toUpperCase();
            document.getElementById('userInitial').textContent = initials.substring(0, 2);
            document.getElementById('userName').textContent = user.full_name.split(' ')[0];
        }

        async function loadCartCount() {
            try {
                const response = await fetch('/api/cart/count');
                const data = await response.json();
                const cartBadge = document.getElementById('cartBadge');
                const cartBadgeMobile = document.getElementById('cartBadgeMobile');
                if (cartBadge) cartBadge.textContent = data.count || 0;
                if (cartBadgeMobile) cartBadgeMobile.textContent = data.count || 0;
            } catch (error) {
                console.error('Cart count error:', error);
            }
        }

        async function loadWishlist() {
            try {
                const response = await fetch('/api/wishlist');
                const result = await response.json();
                const container = document.getElementById('wishlistContainer');
                
                console.log('Wishlist API response:', result);
                
                if (result.success && result.items && result.items.length > 0) {
                    wishlistItems = result.items;
                    renderWishlist();
                } else {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-12 bg-white rounded-2xl border border-[#f0eef8]">
                            <span class="material-symbols-outlined text-6xl text-[#a5a3b5] mb-3">favorite</span>
                            <p class="text-[#a5a3b5] mb-4">Your wishlist is empty</p>
                            <a href="/dashboard" class="inline-block gradient-bg-card text-white px-6 py-2 rounded-xl">Start Shopping</a>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Wishlist load error:', error);
                document.getElementById('wishlistContainer').innerHTML = `
                    <div class="col-span-full text-center py-12 bg-white rounded-2xl border border-[#f0eef8]">
                        <p class="text-red-500 mb-4">Failed to load wishlist. Please try again.</p>
                        <p class="text-sm text-gray-500 mb-4">Error: ${error.message}</p>
                        <a href="/dashboard" class="inline-block text-[#4f6bff] mt-2">Back to Shop</a>
                    </div>
                `;
            }
        }

        function renderWishlist() {
            const container = document.getElementById('wishlistContainer');
            
            if (wishlistItems.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-12 bg-white rounded-2xl border border-[#f0eef8]">
                        <span class="material-symbols-outlined text-6xl text-[#a5a3b5] mb-3">favorite</span>
                        <p class="text-[#a5a3b5] mb-4">Your wishlist is empty</p>
                        <a href="/dashboard" class="inline-block gradient-bg-card text-white px-6 py-2 rounded-xl">Start Shopping</a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = wishlistItems.map(item => {
                const originalPrice = parseFloat(item.price);
                
                return `
                    <div class="wishlist-item bg-white rounded-2xl border border-[#f0eef8] overflow-hidden">
                        <div class="relative cursor-pointer" onclick="viewProduct(${item.product_id})">
                            <div class="wishlist-img-container">
                                ${item.image_url ? 
                                    `<img src="${item.image_url}" class="wishlist-image" alt="${escapeHtml(item.name)}" onerror="this.src='https://via.placeholder.com/200?text=No+Image'">` : 
                                    `<div class="flex items-center justify-center w-full h-full">
                                        <span class="material-symbols-outlined text-6xl text-[#b8b6cc]">${getProductIcon(item.name)}</span>
                                    </div>`
                                }
                            </div>
                            <div class="p-4">
                                <h3 class="font-bold text-[#2a2b3a] line-clamp-1">${escapeHtml(item.name)}</h3>
                                <div class="flex items-center gap-2 mt-2">
                                    <span class="text-xl font-extrabold text-[#4f6bff]">$${originalPrice.toFixed(2)}</span>
                                </div>
                            </div>
                        </div>
                        <div class="p-4 pt-0 flex gap-2">
                            <button onclick="addToCart(${item.product_id})" class="flex-1 bg-gradient-to-r from-[#4f6bff] to-[#7c8eff] text-white text-sm font-semibold py-2 rounded-lg hover:shadow-lg transition-all">
                                Add to Cart
                            </button>
                            <button onclick="removeFromWishlist(${item.product_id})" class="w-10 h-10 bg-red-50 text-red-500 rounded-lg hover:bg-red-100 transition-all flex items-center justify-center">
                                <span class="material-symbols-outlined text-lg">delete</span>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getProductIcon(productName) {
            const name = productName.toLowerCase();
            if (name.includes('watch')) return 'watch';
            if (name.includes('blazer') || name.includes('shirt')) return 'checkroom';
            if (name.includes('chair') || name.includes('sofa')) return 'weekend';
            if (name.includes('headphone')) return 'headphones';
            if (name.includes('bag')) return 'luggage';
            return 'shopping_bag';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function addToCart(productId) {
            if (!currentUser) {
                showToast('Please login to add items to cart');
                window.location.href = '/login';
                return;
            }
            try {
                const response = await fetch('/api/cart/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ product_id: productId, quantity: 1 })
                });
                const result = await response.json();
                if (result.success) {
                    showToast('✅ Added to cart!');
                    await loadCartCount();
                } else {
                    showToast(result.message || 'Failed to add to cart');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error adding to cart');
            }
        }

        async function removeFromWishlist(productId) {
            try {
                const response = await fetch('/api/wishlist/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ product_id: productId })
                });
                const result = await response.json();
                if (result.success) {
                    showToast('Removed from wishlist');
                    await loadWishlist();
                } else {
                    showToast(result.message || 'Failed to remove');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Network error');
            }
        }

        function viewProduct(productId) {
            window.location.href = `/product?id=${productId}`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkLoginStatus();
        });
    </script>
</body>
</html>

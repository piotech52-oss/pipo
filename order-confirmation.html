<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation | PIO E-market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f8f7fc; }
        .gradient-bg-card { background: linear-gradient(135deg, #4f6bff 0%, #7c8eff 100%); }
        .loader {
            border: 3px solid #e8e7f0;
            border-top: 3px solid #4f6bff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a2b3a;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 200;
            animation: fadeOut 3s ease forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body class="bg-[#f8f7fc] antialiased">

    <div id="loadingOverlay" class="fixed inset-0 bg-white/95 z-50 flex items-center justify-center">
        <div class="text-center">
            <div class="loader mx-auto mb-4"></div>
            <p class="text-[#4f6bff] font-medium">Loading order details...</p>
        </div>
    </div>

    <header class="sticky top-0 z-30 bg-white/95 backdrop-blur-xl border-b border-[#eeeef5] shadow-sm">
        <div class="px-4 sm:px-6 lg:px-8 py-3 flex items-center justify-between">
            <a href="/dashboard" class="flex items-center gap-2 text-[#6b6a7e] hover:text-[#4f6bff] transition">
                <span class="material-symbols-outlined">arrow_back</span>
                <span>Continue Shopping</span>
            </a>
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full gradient-bg-card flex items-center justify-center shadow-sm">
                    <span class="text-white font-extrabold text-sm">P</span>
                </div>
                <span class="font-bold text-[#4f6bff]">PIO E-market</span>
            </div>
            <div class="w-20"></div>
        </div>
    </header>

    <div class="max-w-4xl mx-auto px-4 py-12">
        <div id="orderContent" class="text-center">
            <!-- Content will be loaded here -->
        </div>
    </div>

    <script>
        let currentOrder = null;
        let currentItems = null;

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            if (isError) toast.style.background = '#ff6b6b';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function formatNaira(amount) {
            return new Intl.NumberFormat('en-NG', {
                style: 'currency',
                currency: 'NGN',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(amount);
        }

        function getPaymentMethodDisplay(method) {
            switch(method) {
                case 'card':
                    return '💳 Card Payment (Paystack)';
                case 'paystack':
                    return '💳 Card Payment (Paystack)';
                case 'cash_on_delivery':
                    return '💰 Cash on Delivery';
                case 'bank_transfer':
                    return '🏦 Bank Transfer';
                default:
                    return '💳 Card Payment (Paystack)';
            }
        }

        function getPaymentStatusBadge(status) {
            switch(status) {
                case 'paid':
                    return '<span class="inline-block px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-semibold">Paid ✓</span>';
                case 'pending':
                    return '<span class="inline-block px-3 py-1 bg-yellow-100 text-yellow-700 rounded-full text-xs font-semibold">Pending</span>';
                case 'failed':
                    return '<span class="inline-block px-3 py-1 bg-red-100 text-red-700 rounded-full text-xs font-semibold">Failed</span>';
                default:
                    return '<span class="inline-block px-3 py-1 bg-gray-100 text-gray-700 rounded-full text-xs font-semibold">Pending</span>';
            }
        }

        async function loadOrderConfirmation() {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('order_id');
            const paymentStatus = urlParams.get('payment');
            
            if (!orderId) {
                window.location.href = '/dashboard';
                return;
            }
            
            try {
                const response = await fetch(`/api/orders/${orderId}`);
                const result = await response.json();
                
                if (result.success) {
                    currentOrder = result.order;
                    currentItems = result.items;
                    displayOrderConfirmation(currentOrder, currentItems, paymentStatus);
                } else {
                    window.location.href = '/dashboard';
                }
            } catch (error) {
                console.error('Error:', error);
                window.location.href = '/dashboard';
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }
        
        function displayOrderConfirmation(order, items, paymentStatus) {
            const container = document.getElementById('orderContent');
            const orderDate = new Date(order.created_at).toLocaleDateString('en-NG');
            const paymentMethodDisplay = getPaymentMethodDisplay(order.payment_method);
            
            // Show success message if payment was successful
            const successMessage = paymentStatus === 'success' ? 
                '<div class="bg-green-50 border border-green-200 rounded-lg p-4 mb-6 text-green-700">✅ Payment successful! Your order has been confirmed.</div>' : '';
            
            container.innerHTML = `
                <div class="bg-white rounded-2xl border border-[#f0eef8] p-8 mb-6">
                    <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <span class="material-symbols-outlined text-4xl text-green-600">check_circle</span>
                    </div>
                    <h1 class="text-2xl font-extrabold text-[#2a2b3a] mb-2">Order Confirmed! 🎉</h1>
                    <p class="text-[#6b6a7e]">Thank you for your purchase. Your order has been received.</p>
                </div>
                
                ${successMessage}
                
                <div class="bg-white rounded-2xl border border-[#f0eef8] p-6 mb-6">
                    <h2 class="text-lg font-bold text-[#2a2b3a] mb-4">Order Details</h2>
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div>
                            <p class="text-[#6b6a7e]">Order Number</p>
                            <p class="font-semibold text-[#2a2b3a]">${order.order_number}</p>
                        </div>
                        <div>
                            <p class="text-[#6b6a7e]">Order Date</p>
                            <p class="font-semibold text-[#2a2b3a]">${orderDate}</p>
                        </div>
                        <div>
                            <p class="text-[#6b6a7e]">Payment Method</p>
                            <p class="font-semibold text-[#2a2b3a]">${paymentMethodDisplay}</p>
                        </div>
                        <div>
                            <p class="text-[#6b6a7e]">Order Status</p>
                            ${getPaymentStatusBadge(order.status)}
                        </div>
                        <div>
                            <p class="text-[#6b6a7e]">Payment Status</p>
                            ${getPaymentStatusBadge(order.payment_status)}
                        </div>
                    </div>
                </div>
                
                <div class="bg-white rounded-2xl border border-[#f0eef8] p-6 mb-6">
                    <h2 class="text-lg font-bold text-[#2a2b3a] mb-4">Shipping Address</h2>
                    <p class="text-[#2a2b3a]">${escapeHtml(order.full_name || '')}</p>
                    <p class="text-[#2a2b3a]">${escapeHtml(order.address_line1 || '')}</p>
                    <p class="text-[#2a2b3a]">${escapeHtml(order.city || '')}, ${escapeHtml(order.state || '')} ${escapeHtml(order.postal_code || '')}</p>
                    <p class="text-[#2a2b3a]">Phone: ${escapeHtml(order.phone || '')}</p>
                </div>
                
                <div class="bg-white rounded-2xl border border-[#f0eef8] p-6 mb-6">
                    <h2 class="text-lg font-bold text-[#2a2b3a] mb-4">Order Items</h2>
                    <div class="space-y-3">
                        ${items.map(item => `
                            <div class="flex justify-between py-2 border-b border-[#f0eef8]">
                                <div>
                                    <span class="font-medium">${item.quantity}x</span>
                                    <span class="ml-2">${escapeHtml(item.product_name)}</span>
                                </div>
                                <span class="font-semibold">${formatNaira(parseFloat(item.total_price))}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="flex justify-between pt-4 mt-2 border-t border-[#f0eef8]">
                        <span class="text-lg font-bold">Total</span>
                        <span class="text-2xl font-extrabold text-[#4f6bff]">${formatNaira(parseFloat(order.total_amount))}</span>
                    </div>
                </div>
                
                <button onclick="downloadInvoice()" class="inline-block w-full text-center bg-gray-800 text-white font-bold py-3 rounded-xl hover:bg-gray-900 transition-all mt-3 mb-3">
                    📄 Download Invoice (PDF)
                </button>
                
                <a href="/dashboard" class="inline-block w-full text-center gradient-bg-card text-white font-bold py-3 rounded-xl hover:shadow-lg transition-all">
                    Continue Shopping
                </a>
            `;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function downloadInvoice() {
            if (!currentOrder) {
                showToast('Order information not available', true);
                return;
            }
            
            try {
                // Show loading indicator
                const btn = document.querySelector('button[onclick="downloadInvoice()"]');
                const originalText = btn.textContent;
                btn.textContent = '⏳ Generating PDF...';
                btn.disabled = true;
                
                const response = await fetch(`/api/invoice/${currentOrder.id}`);
                
                if (!response.ok) {
                    throw new Error('Failed to generate invoice');
                }
                
                // Get the PDF blob
                const blob = await response.blob();
                
                // Create download link
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `invoice-${currentOrder.order_number}.pdf`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
                
                showToast('✅ Invoice downloaded successfully!');
                
                // Restore button
                btn.textContent = originalText;
                btn.disabled = false;
            } catch (error) {
                console.error('Download error:', error);
                showToast('❌ Failed to download invoice. Please try again.', true);
                
                // Restore button
                const btn = document.querySelector('button[onclick="downloadInvoice()"]');
                if (btn) {
                    btn.textContent = '📄 Download Invoice (PDF)';
                    btn.disabled = false;
                }
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadOrderConfirmation);
    </script>
</body>
</html>

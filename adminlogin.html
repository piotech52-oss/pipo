<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | PIO E-market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-r from-[#4f6bff] to-[#7c8eff] rounded-2xl flex items-center justify-center mx-auto mb-4">
                <span class="text-white font-extrabold text-2xl">A</span>
            </div>
            <h1 class="text-2xl font-bold text-[#1a1a2e]">Admin Login</h1>
            <p class="text-gray-500 text-sm mt-1">Access your dashboard</p>
        </div>
        
        <form id="adminLoginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#4f6bff] focus:border-transparent" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#4f6bff] focus:border-transparent" required>
            </div>
            <div id="message" class="text-red-500 text-sm hidden"></div>
            <button type="submit" class="w-full bg-gradient-to-r from-[#4f6bff] to-[#7c8eff] text-white font-bold py-3 rounded-lg hover:shadow-lg transition-all">
                Login as Admin
            </button>
        </form>
        
        <p class="text-center text-sm text-gray-500 mt-6">
            <a href="/login" class="text-[#4f6bff] hover:underline">← Back to Customer Login</a>
        </p>
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    window.location.href = '/admin/admindashboard.html';
                } else {
                    messageDiv.textContent = result.message;
                    messageDiv.classList.remove('hidden');
                }
            } catch (error) {
                messageDiv.textContent = 'Network error. Please try again.';
                messageDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>

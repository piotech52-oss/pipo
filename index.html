<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(251, 248, 255, 0.8);
            backdrop-filter: blur(20px);
        }
        .gradient-button {
            background: linear-gradient(135deg, #24389c 0%, #3f51b5 100%);
        }
        /* Custom styles for Google button integration */
        .google-login-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .google-login-wrapper .g_id_signin {
            width: 100% !important;
        }
        .google-login-wrapper > div {
            width: 100% !important;
        }
        iframe {
            width: 100% !important;
            border-radius: 0.5rem !important;
        }
        /* Hide default Google one-tap and manage focus states */
        #credential_picker_container, #g_id_onload {
            z-index: 9999;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center px-4 py-12 relative overflow-hidden">
<!-- Background Editorial Elements -->
<div class="absolute top-[-10%] right-[-5%] w-96 h-96 bg-primary-fixed rounded-full blur-[120px] opacity-20"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-96 h-96 bg-secondary-container rounded-full blur-[120px] opacity-30"></div>
<div class="w-full max-w-md relative z-10">
<!-- Branding Anchor -->
<div class="text-center mb-10">
<h1 class="text-4xl font-extrabold tracking-tighter text-primary mb-2">PIO E-market</h1>
<p class="text-on-surface-variant font-medium tracking-tight">Access your curated atelier</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_40px_100px_-20px_rgba(26,27,34,0.06)] p-8 md:p-10">
<form class="space-y-5" id="loginForm">
<!-- Email Field (Primary login identifier) -->
<div class="space-y-2">
<label class="text-[11px] font-bold tracking-widest text-on-surface uppercase" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 outline-none ring-1 ring-outline-variant/20 focus:ring-2 focus:ring-primary rounded-lg px-4 py-3 text-on-surface transition-all placeholder:text-outline/40" id="email" name="email" placeholder="name@domain.com" type="email" required/>
</div>
</div>

<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="text-[11px] font-bold tracking-widest text-on-surface uppercase" for="password">Password</label>
<a class="text-xs font-medium text-primary hover:opacity-80 transition-opacity" href="#" id="forgotPasswordLink">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 outline-none ring-1 ring-outline-variant/20 focus:ring-2 focus:ring-primary rounded-lg px-4 py-3 text-on-surface transition-all placeholder:text-outline/40" id="password" name="password" placeholder="••••••••" type="password" required/>
</div>
</div>

<!-- Submit Button -->
<button class="gradient-button w-full py-4 rounded-lg text-on-primary font-bold tracking-tight shadow-lg shadow-primary/20 hover:scale-[1.01] active:scale-95 transition-all mt-2" type="submit">
    Login to Your Account
</button>
</form>

<!-- Divider -->
<div class="relative my-6">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/20"></div>
</div>
<div class="relative flex justify-center text-[11px]">
<span class="px-4 bg-surface-container-lowest text-outline font-bold uppercase tracking-widest">Or continue with</span>
</div>
</div>

<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-low hover:bg-surface-container-high rounded-lg transition-colors group" id="googleSignInBtn">
<svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-semibold text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-low hover:bg-surface-container-high rounded-lg transition-colors group" id="appleSignInBtn">
<svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="currentColor" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.06.75 1.21-.02 2.1-.81 3.46-.74 1.64.08 2.84.82 3.52 2.13-3.18 1.83-2.68 5.68.44 7.01-.65 1.58-1.55 3.03-2.48 3.82zM12.03 7.25c-.08-2.69 2.21-4.94 4.59-5.25.32 2.8-2.3 5.09-4.59 5.25z"></path>
</svg>
<span class="text-sm font-semibold text-on-surface">Apple</span>
</button>
</div>

<!-- Message Display Area -->
<div id="messageArea" class="mt-4 text-center text-sm hidden"></div>

<!-- Footer Sign-up Link -->
<p class="text-center mt-8 text-on-surface-variant font-medium">
    Don't have an account? 
    <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="/register">Create Account</a>
</p>
</div>
</div>
</main>

<!-- Footer Component -->
<footer class="bg-slate-50 dark:bg-slate-950 w-full py-12 px-8 no-border">
<div class="flex flex-col md:flex-row justify-between items-center gap-6 max-w-7xl mx-auto">
<div class="flex flex-col items-center md:items-start gap-2">
<span class="text-lg font-bold text-indigo-900 dark:text-white">PIO E-market</span>
<p class="text-sm font-inter leading-relaxed text-slate-500 dark:text-slate-400">© 2024 The PIO E-market Framework. All rights reserved.</p>
</div>
<div class="flex flex-wrap justify-center gap-8">
<a class="text-sm font-inter leading-relaxed text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors opacity-80 hover:opacity-100" href="#">Privacy Policy</a>
<a class="text-sm font-inter leading-relaxed text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors opacity-80 hover:opacity-100" href="#">Terms of Service</a>
<a class="text-sm font-inter leading-relaxed text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors opacity-80 hover:opacity-100" href="#">Help Center</a>
<a class="text-sm font-inter leading-relaxed text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors opacity-80 hover:opacity-100" href="#">Contact</a>
</div>
</div>
</footer>

<script>
    // ============================================
    // FORM SUBMIT HANDLER - Connects to Backend API
    // ============================================
    
    const loginForm = document.getElementById("loginForm");
    const messageArea = document.getElementById("messageArea");
    
    function showMessage(message, isError = true) {
        messageArea.textContent = message;
        messageArea.className = `mt-4 text-center text-sm rounded-lg p-3 ${isError ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
        messageArea.classList.remove("hidden");
        
        // Auto hide after 5 seconds
        setTimeout(() => {
            messageArea.classList.add("hidden");
        }, 5000);
    }
    
    if (loginForm) {
        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            
            // Validation
            if (!email || !password) {
                showMessage("Please enter both email and password.", true);
                return;
            }
            
            if (!email.includes("@") || !email.includes(".")) {
                showMessage("Please enter a valid email address.", true);
                return;
            }
            
            if (password.length < 6) {
                showMessage("Password must be at least 6 characters.", true);
                return;
            }
            
            // Disable submit button
            const submitBtn = loginForm.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = "Logging in...";
            
            try {
                // Send login request to backend API
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage(`✅ Welcome back ${result.user.full_name}! Redirecting to dashboard...`, false);
                    
                    // Redirect to dashboard after short delay
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    showMessage(`❌ Login Failed: ${result.message}`, true);
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('❌ Network error. Please make sure the server is running on port 3000.', true);
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });
    }
    
    // ============================================
    // FORGOT PASSWORD HANDLER
    // ============================================
    
    const forgotLink = document.getElementById("forgotPasswordLink");
    if (forgotLink) {
        forgotLink.addEventListener("click", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value.trim();
            
            if (!email) {
                showMessage("Please enter your email address to reset password.", true);
                return;
            }
            
            if (!email.includes("@") || !email.includes(".")) {
                showMessage("Please enter a valid email address.", true);
                return;
            }
            
            try {
                const response = await fetch(`/api/check-email/${encodeURIComponent(email)}`);
                const result = await response.json();
                
                if (result.exists) {
                    showMessage(`📧 Password reset link has been sent to ${email}. (Demo feature)`, false);
                } else {
                    showMessage(`❌ No account found with email: ${email}`, true);
                }
            } catch (error) {
                showMessage("Network error. Please try again.", true);
            }
        });
    }
    
    // ============================================
    // GOOGLE SIGN-IN INTEGRATION
    // ============================================
    
    const GOOGLE_CLIENT_ID = "1080629184243-6mapejb28m47qk9clvphqjcqnr0p5ro3.apps.googleusercontent.com";
    let tokenClient = null;
    
    function initializeGoogleSignIn() {
        if (typeof google !== 'undefined' && google.accounts) {
            const client = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID,
                scope: 'email profile openid',
                callback: async (tokenResponse) => {
                    if (tokenResponse.access_token) {
                        await fetchGoogleUserInfo(tokenResponse.access_token);
                    } else if (tokenResponse.error) {
                        console.error("Google Auth Error:", tokenResponse.error);
                        showMessage("Google sign-in failed. Please try again.", true);
                    }
                },
            });
            return client;
        }
        return null;
    }
    
    async function fetchGoogleUserInfo(accessToken) {
        try {
            const response = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                headers: { Authorization: `Bearer ${accessToken}` }
            });
            const userData = await response.json();
            
            if (userData && !userData.error) {
                // Check if user exists in database
                const checkResponse = await fetch(`/api/check-email/${encodeURIComponent(userData.email)}`);
                const checkResult = await checkResponse.json();
                
                if (checkResult.exists) {
                    // User exists, but we need password - redirect to normal login
                    document.getElementById('email').value = userData.email;
                    showMessage(`Welcome back ${userData.name || userData.email}! Please enter your password to login.`, false);
                    document.getElementById('password').focus();
                } else {
                    // New user - redirect to registration
                    showMessage(`Welcome ${userData.name || userData.email}! Please complete registration.`, false);
                    setTimeout(() => {
                        window.location.href = '/register';
                    }, 1500);
                }
            } else {
                showMessage("Could not retrieve Google profile. Please try manual login.", true);
            }
        } catch (err) {
            console.error("Google userinfo error:", err);
            showMessage("Network error while fetching Google profile.", true);
        }
    }
    
    function onGoogleLibraryLoad() {
        tokenClient = initializeGoogleSignIn();
        console.log("Google Identity Services ready");
    }
    
    const googleBtn = document.getElementById("googleSignInBtn");
    if (googleBtn) {
        googleBtn.addEventListener("click", (e) => {
            e.preventDefault();
            if (typeof google === 'undefined' || !google.accounts) {
                showMessage("Google SDK is still loading. Please try again in a moment.", true);
                return;
            }
            if (!tokenClient) {
                tokenClient = initializeGoogleSignIn();
            }
            if (tokenClient) {
                tokenClient.requestAccessToken({ prompt: 'consent' });
            } else {
                showMessage("Google sign-in is not configured properly.", true);
            }
        });
    }
    
    window.onGoogleLibraryLoad = onGoogleLibraryLoad;
    if (typeof google !== 'undefined' && google.accounts) {
        onGoogleLibraryLoad();
    } else {
        window.addEventListener('load', () => {
            if (typeof google !== 'undefined' && google.accounts) onGoogleLibraryLoad();
        });
    }
    
    // ============================================
    // APPLE SIGN-IN (Placeholder)
    // ============================================
    
    const appleBtn = document.getElementById("appleSignInBtn");
    if (appleBtn) {
        appleBtn.addEventListener("click", (e) => {
            e.preventDefault();
            showMessage("Apple Sign-In will be available soon. Please use email/password or Google login.", false);
        });
    }
    
    // ============================================
    // ENTER KEY SUPPORT
    // ============================================
    
    document.getElementById("password")?.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
            e.preventDefault();
            loginForm.dispatchEvent(new Event("submit"));
        }
    });
</script>
</body>
</html>

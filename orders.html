<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Orders | PIO E-market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f8f7fc; padding-bottom: 70px; }
        .gradient-bg-card { background: linear-gradient(135deg, #4f6bff 0%, #7c8eff 100%); }
        .order-card { transition: all 0.2s ease; }
        .order-card:hover { transform: translateY(-2px); box-shadow: 0 10px 30px -12px rgba(79, 107, 255, 0.15); }
        .loader {
            border: 3px solid #e8e7f0;
            border-top: 3px solid #4f6bff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: #fff3e0; color: #ff9800; }
        .status-processing { background: #e3f2fd; color: #2196f3; }
        .status-shipped { background: #e8f5e9; color: #4caf50; }
        .status-delivered { background: #e8f5e9; color: #2e7d32; }
        .status-cancelled { background: #ffebee; color: #f44336; }
    </style>
</head>
<body class="bg-[#f8f7fc] antialiased">

    <div id="loadingOverlay" class="fixed inset-0 bg-white/95 z-50 flex items-center justify-center">
        <div class="text-center">
            <div class="loader mx-auto mb-4"></div>
            <p class="text-[#4f6bff] font-medium">Loading your orders...</p>
        </div>
    </div>

    <header class="sticky top-0 z-30 bg-white/95 backdrop-blur-xl border-b border-[#eeeef5] shadow-sm">
        <div class="px-4 sm:px-6 lg:px-8 py-3 flex items-center justify-between">
            <a href="/dashboard" class="flex items-center gap-3 cursor-pointer">
                <div class="w-9 h-9 rounded-xl gradient-bg-card flex items-center justify-center shadow-sm">
                    <span class="text-white font-extrabold text-lg">P</span>
                </div>
                <div class="leading-tight">
                    <h1 class="text-xl font-extrabold tracking-tight text-[#4f6bff]">PIO E-market</h1>
                    <p class="text-[10px] font-medium text-[#a5a3b5] tracking-wide">curated atelier</p>
                </div>
            </a>
            <div class="flex items-center gap-4">
                <a href="/dashboard" class="text-sm text-[#6b6a7e] hover:text-[#4f6bff] transition flex items-center gap-1">
                    <span class="material-symbols-outlined text-lg">arrow_back</span>
                    <span class="hidden sm:inline">Back to Shop</span>
                </a>
                <div class="flex items-center gap-2 cursor-pointer hover:bg-[#f0eef8] rounded-full pl-2 pr-3 py-1 transition" id="userMenuBtn">
                    <div class="w-8 h-8 rounded-full gradient-bg-card flex items-center justify-center text-white font-semibold text-sm shadow-sm" id="userInitial">JD</div>
                    <span class="text-sm font-medium text-[#2a2b3a] hidden sm:inline-block" id="userName">Loading...</span>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold text-[#2a2b3a]">📦 My Orders</h1>
            <p class="text-[#a5a3b5] mt-1">Track and manage your order history</p>
        </div>

        <div id="ordersContainer" class="space-y-4">
            <div class="text-center py-12 bg-white rounded-2xl border border-[#f0eef8]">
                <div class="loader mx-auto mb-4"></div>
                <p class="text-[#a5a3b5]">Loading your orders...</p>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;

        async function checkLoginStatus() {
            try {
                const response = await fetch('/api/me');
                const result = await response.json();
                if (result.success) {
                    currentUser = result.user;
                    displayUserInfo(currentUser);
                    await loadOrders();
                } else {
                    window.location.href = '/login';
                }
            } catch (error) {
                window.location.href = '/login';
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        function displayUserInfo(user) {
            const initials = user.full_name.split(' ').map(n => n[0]).join('').toUpperCase();
            document.getElementById('userInitial').textContent = initials.substring(0, 2);
            document.getElementById('userName').textContent = user.full_name.split(' ')[0];
        }

        function getStatusBadgeClass(status) {
            switch(status) {
                case 'pending': return 'status-pending';
                case 'processing': return 'status-processing';
                case 'shipped': return 'status-shipped';
                case 'delivered': return 'status-delivered';
                case 'cancelled': return 'status-cancelled';
                default: return 'status-pending';
            }
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        async function loadOrders() {
            try {
                const response = await fetch('/api/orders');
                const result = await response.json();
                const container = document.getElementById('ordersContainer');
                
                if (result.success && result.orders && result.orders.length > 0) {
                    container.innerHTML = result.orders.map(order => `
                        <div class="order-card bg-white rounded-2xl border border-[#f0eef8] p-6 hover:shadow-md transition-all">
                            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4 pb-4 border-b border-[#f0eef8]">
                                <div>
                                    <p class="text-sm text-[#6b6a7e]">Order Number</p>
                                    <p class="font-bold text-[#2a2b3a]">${order.order_number}</p>
                                </div>
                                <div>
                                    <p class="text-sm text-[#6b6a7e]">Order Date</p>
                                    <p class="font-semibold text-[#2a2b3a]">${formatDate(order.created_at)}</p>
                                </div>
                                <div>
                                    <p class="text-sm text-[#6b6a7e]">Total Amount</p>
                                    <p class="text-xl font-extrabold text-[#4f6bff]">$${order.total_amount}</p>
                                </div>
                                <div>
                                    <span class="status-badge ${getStatusBadgeClass(order.status)}">${order.status.toUpperCase()}</span>
                                </div>
                                <a href="/order-confirmation?order_id=${order.id}" class="text-sm text-[#4f6bff] font-medium hover:underline">
                                    View Details →
                                </a>
                            </div>
                            <div class="text-sm text-[#6b6a7e]">
                                <p>📦 Shipping to: ${order.address_line1}, ${order.city}</p>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = `
                        <div class="text-center py-12 bg-white rounded-2xl border border-[#f0eef8]">
                            <span class="material-symbols-outlined text-6xl text-[#a5a3b5] mb-3">receipt_long</span>
                            <p class="text-[#a5a3b5] mb-4">You haven't placed any orders yet</p>
                            <a href="/dashboard" class="inline-block gradient-bg-card text-white px-6 py-2 rounded-xl">Start Shopping</a>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('ordersContainer').innerHTML = `
                    <div class="text-center py-12 bg-white rounded-2xl border border-[#f0eef8]">
                        <p class="text-red-500">Failed to load orders. Please try again.</p>
                        <a href="/dashboard" class="inline-block text-[#4f6bff] mt-2">Back to Shop</a>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkLoginStatus();
        });
    </script>
</body>
</html>
